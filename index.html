<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charger.az - Ana Səhifə</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; text-align: center; background-color: #fff; }
        header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #eee; align-items: center; position: sticky; top: 0; background: white; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 35px; display: block; }
        .search-icon img { height: 22px; cursor: pointer; }
        
        .search-container { padding: 15px; }
        #searchInput { width: 92%; padding: 14px 20px; border: 1px solid #e0e0e0; border-radius: 30px; font-size: 16px; outline: none; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        
        .section-title { text-align: center; padding: 25px 20px; font-size: 20px; font-weight: 800; color: #1a1a1a; letter-spacing: 1px; }
        
        .product-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        
        /* İstədiyin Frame Dizaynı */
        .product-item { 
            border: 1px solid #eee; 
            border-radius: 20px; 
            padding: 20px 10px; 
            transition: 0.3s; 
            text-decoration: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: #fff; 
            min-height: 250px;
        }
        
        .product-item:active { transform: scale(0.97); }
        
        .product-item img { 
            width: 85%; 
            height: 140px; 
            object-fit: contain; 
            margin-bottom: 15px; 
        }
        
        .product-item p { 
            font-weight: 700; 
            font-size: 12px; 
            margin: 10px 0 5px; 
            color: #004a99; /* Göndərdiyin şəkildəki göy rəng tonu */
            text-transform: uppercase; 
            line-height: 1.3;
            max-width: 90%;
        }
        
        .product-item span { 
            color: #888; 
            font-size: 13px; 
            font-weight: 500; 
        }
        
        #noResults { display: none; padding: 20px; color: #888; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div style="font-size: 24px; cursor: pointer;">☰</div>
            <div class="logo">
                <a href="index.html">
                    <img src="Images_site/Charger.az Logo.png" alt="Logo">
                </a>
            </div>
        </div>
        <div class="search-icon">
            <img src="Images_site/lupa.png" alt="Axtar">
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Məhsul axtar..." onkeyup="searchProduct()">
    </div>

    <div class="section-title">MƏHSULLARIMIZ</div>

    <div id="noResults">Uyğun məhsul tapılmadı.</div>

    <div class="product-list" id="productList">
        
        <!-- ANKER 45W - YENİ FRAME DİZAYNI İLƏ -->
        <a href="anker45w.html" class="product-item" data-name="anker 45w smart display adapter pps gan poweriq">
            <img src="Images_site/Anker 45 1.jpg">
            <p>ANKER 45W (Smart Display)</p>
            <span>99.99 AZN</span>
        </a>

        <!-- APPLE 40W -->
        <a href="apple40w.html" class="product-item" data-name="apple 40w uk adapter dual usb-c">
            <img src="Images_site/apple 40 4.png">
            <p>APPLE 40W (UK)</p>
            <span>99.99 AZN</span>
        </a>

        <!-- Digər məhsullar eyni dizaynla davam edir... -->
        <a href="apple20w.html" class="product-item" data-name="apple 20w usb-c adapter eu">
            <img src="Images_site/apple 20 2.png">
            <p>APPLE 20W (EU)</p>
            <span>59.99 AZN</span>
        </a>

        <a href="anker30w.html" class="product-item" data-name="anker 30w 511 nano 3 usb-c adapter">
            <img src="Images_site/anker30 5.jpg">
            <p>ANKER 30W NANO 3</p>
            <span>69.99 AZN</span>
        </a>

        <a href="samsung25w.html" class="product-item" data-name="samsung 25w usb-c adapter super fast charging sfc">
            <img src="Images_site/samsung25 1.png">
            <p>SAMSUNG 25W (USB-C)</p>
            <span>39.99 AZN</span>
        </a>

    </div>

    <script>
        function searchProduct() {
            let input = document.getElementById('searchInput').value.toLowerCase().trim();
            let items = document.getElementsByClassName('product-item');
            let list = document.getElementById('productList');
            let noResults = document.getElementById('noResults');
            let title = document.querySelector('.section-title');
            let found = false;

            for (let i = 0; i < items.length; i++) {
                let name = items[i].getAttribute('data-name');
                if (name.includes(input)) {
                    items[i].style.display = "flex";
                    found = true;
                } else {
                    items[i].style.display = "none";
                }
            }

            if (found) {
                noResults.style.display = "none";
                list.style.display = "grid";
                title.style.display = "block";
            } else {
                noResults.style.display = "block";
                list.style.display = "none";
                title.style.display = "none";
            }
        }
    </script>

</body>
</html>
